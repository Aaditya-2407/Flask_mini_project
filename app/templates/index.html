<!DOCTYPE html>
<html>
<head><title>MCQ Generator</title></head>
<body>
    <h1>Upload PDF to Generate MCQs</h1>
    <input type="file" id="pdfInput">
    <button onclick="generate()">Generate</button>
    <pre id="output"></pre>

    <script>
        async function generate() {
    const fileInput = document.getElementById('pdfInput');
    const resultsDiv = document.getElementById('output');
    resultsDiv.innerText = "Generating questions... please wait.";

    const formData = new FormData();
    formData.append('pdf', fileInput.files[0]);

    const response = await fetch('/upload', { method: 'POST', body: formData });
    const data = await response.json();

    resultsDiv.innerHTML = ""; 
    data.questions.forEach((q, index) => {
        resultsDiv.innerHTML += `
            <div>
                <p><strong>Q${index + 1}: ${q.question}</strong></p>
                <ul>${q.options.map(opt => `<li>${opt}</li>`).join('')}</ul>
                <p style="color: green;"><em>Answer: ${q.answer}</em></p>
            </div><hr>`;
    });
}
    </script>
</body>
</html>
